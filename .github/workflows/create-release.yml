name: Create Release

on:
    push:
      branches:
        - main
    workflow_dispatch:

jobs:
  create-release:
    if: |
      github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'commit new version') == true
    runs-on: ubuntu-latest
    outputs:
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract Version
        id: extract-version
        run: |
          # Use grep to find the first occurrence of the version number matching "## v" pattern
          version=$(grep -m 1 -oP '## v\d+\.\d+\.\d+' CHANGELOG.md | cut -d ' ' -f 2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract Changelog
        id: extract-changelog
        run: |
          # Extract the content between the last two version headers
          changelog=$(awk '/^## v[0-9]+\.[0-9]+\.[0-9]+/{if (!version) {version=$0; next}} /^## v[0-9]+\.[0-9]+\.[0-9]+/{exit} {if (version) description = description ORS $0} END {if (version) print description}' CHANGELOG.md | sed -e '/^## v[0-9]+\.[0-9]+\.[0-9]+/d; s/^# //' > changelog.txt)
          echo "changelog_file=changelog.txt" >> "$GITHUB_OUTPUT"
          
      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.extract-version.outputs.version }}
          release_name: ${{ steps.extract-version.outputs.version }}
          body_path: ${{ steps.extract-changelog.outputs.changelog_file }}
          draft: false
          prerelease: false