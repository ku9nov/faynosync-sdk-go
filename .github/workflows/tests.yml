name: Tests

on:
    push:
      branches:
        - main
    workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Run unit tests
        run: |
          go test ./... -race
        continue-on-error: false